##############################################################################
# USStockStory — 매일 09:00 KST 자동 포스팅
# 전체 시스템 문서: AUTO_POSTING_SYSTEM.md
##############################################################################
#
# ── 실행 흐름 ────────────────────────────────────────────────────────────
#  1. api.bigtrust.site 로그인 (매번 fresh 토큰 발급)
#  2. 기존 포스팅 목록 조회
#     - 카테고리 분포 분석 → 포스팅 수 적은 카테고리 우선 선정
#     - content_md의 <!-- thumbnail_bg: ID --> 주석으로 사용된 사진 추적
#  3. Claude API (claude-sonnet-4-6)로 주제 3개 선정
#     - POSTING_STANDARDS.md + THUMBNAIL_GENERATION-8.md 프롬프트 주입
#     - 기존 포스트 제목 전달 → 중복 주제 방지
#     - 미사용 Unsplash 사진 목록(+설명) 전달 → 주제에 맞는 사진 선택
#  4. Claude API로 각 포스트 본문 생성 (E-E-A-T 기준, 1000~1500 words)
#  5. Node.js Canvas로 썸네일 합성 (1200×630px)
#     - Unsplash 배경 + 다크 오버레이 + 감정 글로우 + 텍스트 레이어
#     - 하락 차트 이미지 금지 / 이모지 금지 / 포스트간 동일 사진 금지
#  6. 썸네일 → Cloudflare R2 업로드 → cover_image_url
#  7. POST /api/posts 로 게시 (is_published: true)
#
# ── 규칙 히스토리 ────────────────────────────────────────────────────────
#  2026-04-16  최초 설정. GitHub Actions 선택 (n8n 대신).
#              로그인 엔드포인트: POST /api/auth/login (email+password)
#  2026-04-16  POSTING_STANDARDS.md + THUMBNAIL_GENERATION-8.md 런타임 주입
#              → 두 파일 수정 시 다음 실행부터 자동 반영
#  2026-04-16  기존 포스트 목록 조회 → 중복 주제 방지 로직 추가
#  2026-04-17  카테고리 균형 규칙: 포스팅 수 적은 카테고리 우선 선정
#  2026-04-17  사진 중복 방지: content_md에 <!-- thumbnail_bg: PHOTO_ID -->
#              주석으로 썸네일 배경 사진 추적 (R2 URL에서 역추적 불가 문제 해결)
#  2026-04-17  미사용 Unsplash 사진 목록을 Claude에게 전달
#              → 주제 관련성 + 중복 방지 동시 충족
#  2026-04-17  POST_COUNT 환경변수로 포스팅 개수 조정 가능 (기본 3)
#
# ── 필수 GitHub Secrets ──────────────────────────────────────────────────
#  BIGTRUST_EMAIL    : admin@bigtrust.site
#  BIGTRUST_PASSWORD : 관리자 비밀번호
#  ANTHROPIC_API_KEY : Claude API 키 (sk-ant-...)
#
# ── 로컬 테스트 ──────────────────────────────────────────────────────────
#  POST_COUNT=1 \
#    BIGTRUST_EMAIL="admin@bigtrust.site" \
#    BIGTRUST_PASSWORD="..." \
#    ANTHROPIC_API_KEY="$(grep ANTHROPIC_API_KEY backend/.env.local | cut -d= -f2)" \
#    node scripts/auto_post.js
##############################################################################

name: Daily US Stock Post (9AM KST)

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 00:00 UTC = 한국시간 09:00 KST
  workflow_dispatch:        # GitHub UI에서 수동 실행 가능

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # node-canvas 네이티브 빌드에 필요한 시스템 라이브러리
      - name: Install canvas system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential \
            libcairo2-dev \
            libpango1.0-dev \
            libjpeg-dev \
            libgif-dev \
            librsvg2-dev

      - name: Install Node.js dependencies
        run: npm install

      - name: Run daily post script
        env:
          BIGTRUST_EMAIL:    ${{ secrets.BIGTRUST_EMAIL }}
          BIGTRUST_PASSWORD: ${{ secrets.BIGTRUST_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/auto_post.js
